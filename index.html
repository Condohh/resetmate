<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResetMate</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" />

  <!-- App styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="header-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <h1 class="header-title">ResetMate</h1>
      </div>
      <span class="header-tag">Workshop Tool</span>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main-content">

    <!-- Selector card -->
    <section class="card selector-card">

      <div class="field-group">
        <label class="field-label" for="vehicleSelect">Vehicle</label>
        <div class="select-wrapper">
          <select id="vehicleSelect" class="field-select">
            <option value="">Select vehicle...</option>
          </select>
          <svg class="select-chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="resetSelect">Reset Type</label>
        <div class="select-wrapper">
          <select id="resetSelect" class="field-select">
            <option value="">Select reset type...</option>
          </select>
          <svg class="select-chevron" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <button id="showStepsBtn" class="btn-primary">Show Reset Steps</button>

    </section>

    <!-- Result area — populated by script.js -->
    <section id="resultArea" class="result-area" aria-live="polite"></section>

  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="app-footer">
    <p>ResetMate v1.0 &nbsp;&middot;&nbsp; Workshop Reference Tool</p>
  </footer>

  <!--
    script.js is loaded here — at the end of <body>.
    This means the entire DOM is already parsed when the script runs,
    so getElementById calls and event listeners work without any
    DOMContentLoaded wrapper.
  -->
  <script src="script.js"></script>

</body>
</html>
